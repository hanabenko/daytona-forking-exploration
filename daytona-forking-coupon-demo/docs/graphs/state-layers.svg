<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">State Layers Reused By Forking</title>
  <desc id="desc">Different lifecycle operations preserve different layers; the guide keeps those semantics separate.</desc>
  <style>
    .bg { fill: #0a0a0a; }
    .panel { fill: #161616; stroke: #414141; stroke-width: 1.5; rx: 8; }
    .ink { fill: #ffffff; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .muted { fill: #a2a2a2; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { font-size: 34px; font-weight: 800; letter-spacing: 0; }
    .subtitle { font-size: 16px; letter-spacing: 0; }
    .label { font-size: 16px; font-weight: 800; letter-spacing: 0; }
    .small { font-size: 13px; letter-spacing: 0; }
    .tiny { font-size: 11px; letter-spacing: 0; }
    .line { stroke: #414141; stroke-width: 2; fill: none; }
    .blue { fill: #2ecc71; }
    .green { fill: #00e49a; }
    .amber { fill: #f1c40f; }
    .red { fill: #e74c3c; }
    .soft-blue { fill: #102017; stroke: #2ecc71; }
    .soft-green { fill: #102017; stroke: #2ecc71; }
    .soft-amber { fill: #211d0f; stroke: #f1c40f; }
    .soft-red { fill: #211013; stroke: #e74c3c; }
    .soft-gray { fill: #111111; stroke: #414141; }
  </style>
  <rect class="bg" width="1200" height="720"/>
  <text class="ink title" x="56" y="58">State Layers Reused By Forking</text>
  <text class="muted subtitle" x="56" y="88">Different lifecycle operations preserve different layers; the guide keeps those semantics separate.</text>
  <rect class="panel soft-blue" x="74" y="132" width="720" height="82" rx="8"/>
  <text class="ink label" x="104" y="163">Layer 1: Filesystem state</text>
  <text class="muted small" x="104" y="190">repo files, node_modules/package lock, dist/, seeded data, logs, state-marker.txt</text>
  <circle cx="868" cy="173" r="24" fill="#161616" stroke="#414141"/>
  <text class="ink label" text-anchor="middle" x="868" y="179">1</text>
<rect class="panel soft-green" x="74" y="246" width="720" height="82" rx="8"/>
  <text class="ink label" x="104" y="277">Layer 2: Sandbox configuration state</text>
  <text class="muted small" x="104" y="304">environment variables, exposed ports, working directory, service configuration</text>
  <circle cx="868" cy="287" r="24" fill="#161616" stroke="#414141"/>
  <text class="ink label" text-anchor="middle" x="868" y="293">2</text>
<rect class="panel soft-amber" x="74" y="360" width="720" height="82" rx="8"/>
  <text class="ink label" x="104" y="391">Layer 3: Runtime/process state</text>
  <text class="muted small" x="104" y="418">running dev server, in-memory caches, process memory, file descriptors</text>
  <circle cx="868" cy="401" r="24" fill="#161616" stroke="#414141"/>
  <text class="ink label" text-anchor="middle" x="868" y="407">3</text>
<rect class="panel soft-red" x="74" y="474" width="720" height="82" rx="8"/>
  <text class="ink label" x="104" y="505">Layer 4: Agent/debugging state externalized to disk</text>
  <text class="muted small" x="104" y="532">debug-brief.md, hypotheses, failing logs, reproduction notes, fork plan</text>
  <circle cx="868" cy="515" r="24" fill="#161616" stroke="#414141"/>
  <text class="ink label" text-anchor="middle" x="868" y="521">4</text>
  <path class="line" d="M868 214v32 M868 328v32 M868 442v32"/>
  <rect class="panel" x="840" y="590" width="286" height="70" rx="8"/>
  <text class="ink label" x="866" y="620">Prepared parent sandbox</text>
  <text class="muted small" x="866" y="645">Forks branch after useful state exists.</text>
</svg>
