<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Lifecycle Operations Are Not Interchangeable</title>
  <desc id="desc">Stop/start, pause, fork, snapshot, and restore each answer a different state reuse question.</desc>
  <style>
    .bg { fill: #0a0a0a; }
    .panel { fill: #161616; stroke: #414141; stroke-width: 1.5; rx: 8; }
    .ink { fill: #ffffff; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .muted { fill: #a2a2a2; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .title { font-size: 34px; font-weight: 800; letter-spacing: 0; }
    .subtitle { font-size: 16px; letter-spacing: 0; }
    .label { font-size: 16px; font-weight: 800; letter-spacing: 0; }
    .small { font-size: 13px; letter-spacing: 0; }
    .tiny { font-size: 11px; letter-spacing: 0; }
    .line { stroke: #414141; stroke-width: 2; fill: none; }
    .blue { fill: #2ecc71; }
    .green { fill: #00e49a; }
    .amber { fill: #f1c40f; }
    .red { fill: #e74c3c; }
    .soft-blue { fill: #102017; stroke: #2ecc71; }
    .soft-green { fill: #102017; stroke: #2ecc71; }
    .soft-amber { fill: #211d0f; stroke: #f1c40f; }
    .soft-red { fill: #211013; stroke: #e74c3c; }
    .soft-gray { fill: #111111; stroke: #414141; }
  </style>
  <rect class="bg" width="1200" height="720"/>
  <text class="ink title" x="56" y="58">Lifecycle Operations Are Not Interchangeable</text>
  <text class="muted subtitle" x="56" y="88">Stop/start, pause, fork, snapshot, and restore each answer a different state reuse question.</text>
  <rect class="panel soft-blue" x="80" y="150" width="170" height="180" rx="8"/>
  <text class="ink label" text-anchor="middle" x="165" y="190">Stop/start</text>
  <text class="ink small" text-anchor="middle" x="165" y="226">Same sandbox</text>
  <foreignObject x="104" y="246" width="122" height="58">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #a2a2a2; font-size: 12px; line-height: 1.35; text-align: center;">Files persist; restart processes</div>
  </foreignObject>
<rect class="panel soft-amber" x="300" y="150" width="170" height="180" rx="8"/>
  <text class="ink label" text-anchor="middle" x="385" y="190">Pause</text>
  <text class="ink small" text-anchor="middle" x="385" y="226">Same sandbox</text>
  <foreignObject x="324" y="246" width="122" height="58">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #a2a2a2; font-size: 12px; line-height: 1.35; text-align: center;">Freeze runtime state where supported</div>
  </foreignObject>
<rect class="panel soft-green" x="520" y="150" width="170" height="180" rx="8"/>
  <text class="ink label" text-anchor="middle" x="605" y="190">Fork</text>
  <text class="ink small" text-anchor="middle" x="605" y="226">New sandbox</text>
  <foreignObject x="544" y="246" width="122" height="58">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #a2a2a2; font-size: 12px; line-height: 1.35; text-align: center;">Independent future from current disk</div>
  </foreignObject>
<rect class="panel soft-gray" x="740" y="150" width="170" height="180" rx="8"/>
  <text class="ink label" text-anchor="middle" x="825" y="190">Snapshot</text>
  <text class="ink small" text-anchor="middle" x="825" y="226">Saved baseline</text>
  <foreignObject x="764" y="246" width="122" height="58">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #a2a2a2; font-size: 12px; line-height: 1.35; text-align: center;">Reusable filesystem checkpoint</div>
  </foreignObject>
<rect class="panel soft-red" x="960" y="150" width="170" height="180" rx="8"/>
  <text class="ink label" text-anchor="middle" x="1045" y="190">Restore</text>
  <text class="ink small" text-anchor="middle" x="1045" y="226">New sandbox</text>
  <foreignObject x="984" y="246" width="122" height="58">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #a2a2a2; font-size: 12px; line-height: 1.35; text-align: center;">Created later from snapshot</div>
  </foreignObject>
  <path class="line" d="M165 396h880"/>
  <circle class="blue" cx="165" cy="396" r="7"/>
  <circle class="amber" cx="385" cy="396" r="7"/>
  <circle class="green" cx="605" cy="396" r="7"/>
  <circle fill="#a2a2a2" cx="825" cy="396" r="7"/>
  <circle class="red" cx="1045" cy="396" r="7"/>
  <text class="ink label" x="92" y="468">Key distinction</text>
  <text class="muted small" x="92" y="498">Stop/start returns to the same sandbox. Fork and restore create new sandbox identities.</text>
  <text class="muted small" x="92" y="522">Pause is about live runtime state. Snapshot is a reusable baseline concept.</text>
</svg>
